name: Release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Require a SemVer release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must use SemVer, for example v1.2.3"
            exit 1
          fi

  windows:
    needs: validate-tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --bins
      - shell: pwsh
        run: Compress-Archive -Path target/release/citrix-vdi-launcher.exe,target/release/citrix-vdi-cli.exe -DestinationPath citrix-vdi-launcher-windows-x86_64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: citrix-vdi-launcher-windows-x86_64.zip

  macos:
    needs: validate-tag
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Build ad-hoc signed universal macOS app
        run: ./packaging/build-macos.sh
      - name: Package universal macOS app
        run: |
          mkdir macos-release
          cp -R target/release/bundle/osx/citrix-vdi-launcher.app macos-release/
          cp packaging/macos/install-macos.command packaging/macos/README-RU.txt macos-release/
          chmod +x macos-release/install-macos.command
          ditto -c -k --sequesterRsrc --keepParent macos-release citrix-vdi-launcher-macos-universal.zip
      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: citrix-vdi-launcher-macos-universal.zip

  linux:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libxkbcommon-dev libwayland-dev libx11-dev libxi-dev libgl1-mesa-dev
      - run: cargo build --release --bins
      - run: cargo install cargo-deb cargo-generate-rpm --locked
      - run: cargo deb --no-build
      - run: cargo generate-rpm
      - uses: actions/upload-artifact@v7
        with:
          name: linux-native-packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

  publish:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**/*
