name: Release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Require a SemVer release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must use SemVer, for example v1.2.3"
            exit 1
          fi

  windows:
    needs: validate-tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --bins
      - shell: pwsh
        run: Compress-Archive -Path target/release/citrix-vdi-launcher.exe,target/release/citrix-vdi-cli.exe -DestinationPath citrix-vdi-launcher-windows-x86_64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: citrix-vdi-launcher-windows-x86_64.zip

  macos:
    needs: validate-tag
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --bins
      - run: cargo install cargo-bundle --locked
      - run: cargo bundle --release --bin citrix-vdi-launcher
      - run: cp target/release/citrix-vdi-cli target/release/bundle/osx/citrix-vdi-launcher.app/Contents/MacOS/citrix-vdi-cli
      - run: ditto -c -k --sequesterRsrc --keepParent target/release/bundle/osx/citrix-vdi-launcher.app citrix-vdi-launcher-macos-native.zip
      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: citrix-vdi-launcher-macos-native.zip

  linux:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libxkbcommon-dev libwayland-dev libx11-dev libxi-dev libgl1-mesa-dev
      - run: cargo build --release --bins
      - run: cargo install cargo-deb cargo-generate-rpm --locked
      - run: cargo deb --no-build
      - run: cargo generate-rpm
      - uses: actions/upload-artifact@v7
        with:
          name: linux-native-packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

  publish:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/**/*
